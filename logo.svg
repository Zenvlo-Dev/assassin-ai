<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="40" y2="40">
      <stop offset="0%" stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="#151B2D"/>
  <rect x="1" y="1" width="38" height="38" rx="9" stroke="url(#lg)" stroke-width="1.5"/>
  <!-- Crossed swords icon -->
  <g transform="translate(20,20) rotate(-45)" stroke-linecap="round">
    <!-- Left sword -->
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#5865F2" stroke-width="2.8"/>
    <line x1="-4" y1="-4" x2="-12" y2="-12" stroke="#5865F2" stroke-width="1.2"/>
    <!-- Right sword -->
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#00D4FF" stroke-width="2.8"/>
    <line x1="4" y1="-4" x2="12" y2="-12" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- Center gem -->
    <circle cx="0" cy="0" r="3" fill="#00D4FF"/>
    <circle cx="0" cy="0" r="1.5" fill="#fff" opacity="0.6"/>
  </g>
</svg>
